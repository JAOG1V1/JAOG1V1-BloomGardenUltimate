<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Bloom Garden Ultimate</title>
    <link rel="stylesheet" href="/src/styles/style.css" />
  </head>
  <body>
    <div id="app">
      <canvas id="scene"></canvas>

      <div id="ui-root">
        <div class="hud glass" id="hud">
          <div class="hud-title">🌸 Bloom Garden Ultimate</div>
          <div class="hud-grid">
            <div class="hud-stat">
              <span class="hud-icon">⭐</span>
              <span>Pontuação</span>
              <span class="hud-val" id="score-value">0</span>
            </div>
            <div class="hud-stat">
              <span class="hud-icon">💧</span>
              <span>Seiva</span>
              <span class="hud-val" id="sap-value">0</span>
            </div>
            <div class="hud-stat">
              <span class="hud-icon">⚡</span>
              <span>Energia</span>
              <span class="hud-val" id="energy-value">0</span><span>%</span>
            </div>
            <div class="hud-stat">
              <span class="hud-icon">🌿</span>
              <span>Nível</span>
              <span class="hud-val" id="level-value">1</span>
            </div>
          </div>
          <div class="energy-bar">
            <div class="energy-bar-fill" id="energy-bar-fill"></div>
          </div>
        </div>

        <div class="bottom-message glass" id="message-box">
          Toque ou clique na flor para energizar o jardim ✨
        </div>

        <div class="menu-overlay" id="menu-overlay">
          <div class="menu-card glass">
            <div class="menu-logo">🌸</div>
            <h1>Bloom Garden<br /><span>Ultimate</span></h1>
            <p>
              Um jardim mágico vivo, pronto para florescer.<br />
              Clique na flor e sinta a magia crescer.
            </p>
            <button id="start-button">
              <span>Entrar no Jardim</span>
              <span class="btn-glow"></span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
